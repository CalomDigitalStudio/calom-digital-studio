<div class="calom-logo">
  <svg viewBox="0 0 1536 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CALOM Digital Studio">
    <defs>
      <linearGradient id="doorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1ea7ff"/>
        <stop offset="55%" stop-color="#6b5cff"/>
        <stop offset="100%" stop-color="#d24cff"/>
      </linearGradient>

      <filter id="glow">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <radialGradient id="floorGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#b65cff" stop-opacity="0.8"/>
        <stop offset="45%" stop-color="#496cff" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- alone luminoso -->
    <ellipse cx="760" cy="725" rx="245" ry="48" fill="url(#floorGlow)"/>

    <!-- porta -->
    <g filter="url(#glow)">
      <path d="M620 205 L888 255 L888 665 L620 715 Z"
            fill="none"
            stroke="url(#doorGrad)"
            stroke-width="7"
            stroke-linejoin="round"/>

      <path d="M888 255 L930 272 L930 695 L888 665"
            fill="none"
            stroke="#c44cff"
            stroke-width="7"
            stroke-linejoin="round"/>

      <line x1="620" y1="205" x2="620" y2="715"
            stroke="#1ea7ff"
            stroke-width="7"/>

      <line x1="930" y1="272" x2="930" y2="695"
            stroke="#d24cff"
            stroke-width="7"/>
    </g>

    <!-- scritta principale -->
    <text x="245" y="500"
          font-family="Montserrat, Gotham, Avenir Next, Arial, sans-serif"
          font-size="132"
          font-weight="300"
          letter-spacing="75"
          fill="#ffffff">
      CΛLOM
    </text>

    <!-- sottotitolo -->
    <text x="365" y="600"
          font-family="Montserrat, Gotham, Avenir Next, Arial, sans-serif"
          font-size="42"
          font-weight="400"
          letter-spacing="34"
          fill="#ffffff">
      DIGITAL STUDIO
    </text>
  </svg>
</div>

<style>
  .calom-logo {
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
  }

  .calom-logo svg {
    width: 100%;
    height: auto;
    display: block;
  }
</style>
